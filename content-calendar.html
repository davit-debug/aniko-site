<style>
/* ===========================================================
   ANIKO — Monthly Content Calendar
   Exact replica of the Canva layout: dark navy canvas, white
   rounded day cells, Platform legend (IG yellow / LI pink),
   colored platform bars under each post.
   =========================================================== */
:root{
  --bg:#120a22; --bg-page:#1b1030; --card:#FBF7F1; --legend-dark:#2A1240;
  --ink:#F3F1FF; --ink-dim:#b9b1e6; --ink-dark:#1c1240; --cell-muted:#5d5872; /* darkened for AA contrast on the off-white cells */
  --yellow:#F8C81C; --pink:#F06CA8;
  --line:rgba(255,255,255,.10);
  --font-display:'Fredoka',system-ui,sans-serif;
  --font:'Montserrat',system-ui,sans-serif;
  --font-ka:'Noto Sans Georgian','Montserrat',sans-serif;
  --maxw:1280px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg-page);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.5}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
:focus-visible{outline:3px solid var(--yellow);outline-offset:3px;border-radius:6px}
.skip{position:absolute;left:-999px;background:var(--yellow);color:#000;padding:10px 16px;border-radius:8px;font-weight:700;z-index:200}
.skip:focus{left:16px;top:16px}

/* ---------- header — floating pill (same as index-aniko) ---------- */
header.nav{position:fixed;top:18px;left:0;right:0;z-index:100;padding:0 clamp(14px,2.8vw,40px);
  transition:top .5s cubic-bezier(.22,.61,.36,1)}
.nav-bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:62px;padding:0 30px;
  max-width:1400px;margin:0 auto;
  background:rgba(255,255,255,.07);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);
  border:1px solid rgba(255,255,255,.13);border-radius:999px;box-shadow:0 12px 40px rgba(0,0,0,.28);
  transition:max-width .55s cubic-bezier(.5,0,.1,1),background .45s,box-shadow .45s,height .45s cubic-bezier(.22,.61,.36,1),column-gap .45s}
/* Aurora scroll morph: the wide pill shrinks to a compact centered dark bar */
header.nav.scrolled{top:14px}
header.nav.scrolled .nav-bar{max-width:760px;height:54px;column-gap:8px;
  background:rgba(12,6,20,.96);border-color:rgba(255,255,255,.07);box-shadow:0 18px 46px rgba(0,0,0,.55)}
header.nav.scrolled .nav-side{gap:22px}
.nav-side{display:flex;align-items:center;gap:30px}
.nav-side.left{justify-content:flex-start}
.nav-side.right{justify-content:flex-end}
.nav-side a{font-family:var(--font-display);font-size:1rem;font-weight:500;color:var(--ink-dim);letter-spacing:.01em;padding:10px 2px;transition:color .15s}
.nav-side a:hover,.nav-side a.active{color:var(--ink)}
.nav-ic{display:grid;place-items:center;width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(255,255,255,.22);color:var(--ink);padding:0!important;transition:border-color .2s,background .2s,transform .3s}
.nav-ic svg{width:19px;height:19px}
.nav-ic.active{border-color:var(--yellow);color:var(--yellow)}
.nav-ic:hover{border-color:var(--yellow);background:rgba(255,255,255,.06);transform:translateY(-1px)}
.brand{grid-column:2;justify-self:center;display:flex;align-items:center;gap:.22em;font-family:var(--font-display);font-weight:700;font-size:1.5rem;letter-spacing:.01em;color:var(--ink);white-space:nowrap}
.brand .logo-mark{height:1.3em;width:auto;display:block;transition:transform .5s cubic-bezier(.22,.61,.36,1)}
.brand:hover .logo-mark{transform:rotate(60deg)}
/* Aurora-style brand: letters wave on hover; on scroll only "A" + logo remain */
.b-ltrs{display:inline-flex;align-items:baseline}
.b-ltrs .ltr{display:inline-block;transition:transform .33s cubic-bezier(.34,1.56,.64,1)}
.brand:hover .ltr{transform:translateY(-6px)}
.b-rest{display:inline-flex;overflow:hidden;max-width:4em;opacity:1;
  transition:max-width .45s cubic-bezier(.5,0,.1,1),opacity .3s ease}
header.nav.scrolled .b-rest{max-width:0;opacity:0}
/* Aurora-style custom cursor */
.cursor-dot{position:fixed;left:0;top:0;width:13px;height:13px;border-radius:50%;background:var(--yellow);
  pointer-events:none;z-index:9999;transform:translate(-50%,-50%) scale(1);opacity:0;
  transition:opacity .25s ease;will-change:transform}
.cursor-dot.on{opacity:.9}
.cursor-dot.grow{background:var(--pink)}
@media(pointer:coarse){.cursor-dot{display:none}}
.burger{display:none;justify-self:end;grid-column:3;background:none;border:0;color:var(--ink);cursor:pointer;padding:8px}
.burger svg{width:26px;height:26px}
.nav-mobile{display:none}

/* ---------- calendar board ("Canva page") ---------- */
main{padding-top:78px}
.board{background:var(--bg);border-radius:28px;padding:56px 54px;margin:36px 0;
  display:grid;grid-template-columns:250px 1fr;gap:44px;align-items:start}
.board + .board{margin-top:44px}

/* left column */
.side h2{font-family:var(--font);font-weight:800;font-size:1.45rem;letter-spacing:.01em;margin:0;color:var(--ink);text-transform:uppercase;line-height:1.25}
.side .month{font-family:var(--font);font-weight:800;font-size:clamp(2.2rem,4vw,3rem);margin:.35em 0 .5em;color:#fff}
.year-pill{display:inline-block;background:var(--card);color:var(--ink-dark);font-weight:800;font-size:1rem;
  padding:8px 26px;border-radius:999px}
.legend{background:var(--card);border-radius:22px;padding:18px 16px 12px;margin-top:120px;max-width:250px}
.legend .t{font-family:var(--font);font-weight:800;font-size:1.15rem;color:var(--ink-dark);margin:0 0 14px 8px}
.legend-pills{background:var(--legend-dark);border-radius:999px;padding:7px;display:flex;gap:7px}
.legend-pills span{flex:1;text-align:center;font-weight:800;font-size:.86rem;color:var(--ink-dark);padding:9px 6px;border-radius:999px}
.legend-pills .ig{background:var(--yellow)}
.legend-pills .li{background:var(--pink)}

/* grid */
.cal-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;min-width:0;max-width:100%} /* min-width:0 lets it shrink inside the board grid */
.cal{min-width:720px}
.cal-head{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:14px;margin-bottom:12px}
.cal-head div{text-align:center;font-weight:800;font-size:.82rem;letter-spacing:.08em;color:var(--ink)}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));grid-auto-rows:1fr;gap:14px}
.cell{background:var(--card);border-radius:14px;min-height:118px;padding:9px 11px 11px;
  display:flex;flex-direction:column;color:var(--ink-dark)}
.cell.empty{background:var(--card);opacity:1}
.cell .d{font-weight:700;font-size:.85rem;color:var(--ink-dark)}
.cell .post-t{font-family:var(--font-ka);font-weight:800;font-size:.6rem;line-height:1.35;margin-top:6px;text-transform:uppercase;overflow-wrap:break-word;min-width:0}
.cell .post-k{font-family:var(--font-ka);font-weight:600;font-size:.55rem;color:var(--cell-muted);margin-top:5px}
.cell .bar{height:8px;border-radius:999px;width:78%;margin-top:auto}
.cell .bar.ig{background:var(--yellow)}
.cell .bar.li{background:var(--pink)}
.cell.has{transition:transform .35s cubic-bezier(.22,.61,.36,1),box-shadow .35s}
.sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.cell.has:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(0,0,0,.35)}

/* ---------- motion (site vocabulary) ---------- */
.m{opacity:0}
.m-float.in{animation:floatIn .8s cubic-bezier(.22,.61,.36,1) var(--d,0s) both}
@keyframes floatIn{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}

/* ---------- footer ---------- */
footer{padding:48px 0 36px;border-top:1px solid var(--line);margin-top:30px}
.foot-in{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;color:var(--ink-dim);font-size:.85rem}

/* ---------- responsive ---------- */
/* board stacks earlier — at 1024 the side column squeezed the grid until SAT clipped */
@media(max-width:1120px){
  .board{grid-template-columns:1fr;padding:34px 24px;gap:22px}
  .legend{margin-top:14px}
  .side .month{margin-bottom:.3em}
}
@media(max-width:760px){
  .nav-side{display:none}
  .burger{display:inline-flex}
  .nav-mobile.open{display:flex;flex-direction:column;position:absolute;top:74px;left:clamp(14px,2.8vw,40px);right:clamp(14px,2.8vw,40px);background:rgba(27,16,48,.97);border:1px solid var(--line);border-radius:22px;padding:18px 26px;gap:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .nav-mobile a{font-family:var(--font-display);font-size:1.12rem;font-weight:500;color:var(--ink)}
}
@media(max-width:600px){
  .wrap{padding:0 16px}
}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *{animation:none!important;transition:none!important}
  .m{opacity:1!important}
}
</style>
</head>

<main id="main">
  <h1 class="sr">Monthly Content Calendar — Anna Chikhiashvili</h1>
  <div class="wrap" id="boards"><!-- months render here --></div>
</main>

<script>
/* ============================================================
   CONTENT DATA — ედიტირებადი ნაწილი.
   p: 'ig' = Instagram (ყვითელი) · 'li' = LinkedIn (ვარდისფერი)
   k: პოსტის ტიპი (ვიდეო პოსტი / კარუსელი პოსტი / პოსტი)
   ============================================================ */
var CAL = [
  {
    name: 'October', year: 2026, month: 9, // JS month index (9 = October)
    entries: {
      2:  { t: 'POV: YOU REALIZE THERE ARE ONLY 3 MONTHS LEFT OF 2026', k: 'Reel', p: 'ig' },
      5:  { t: '3 TOOLS FOR CREATING VISUAL CONTENT', k: 'Carousel post', p: 'ig' },
      7:  { t: 'WHY DO WE THINK WE SHOULD KNOW EVERYTHING IN OUR 20S?', k: 'Post', p: 'li' },
      9:  { t: 'WHAT IS THE DIFFERENCE BETWEEN MICRO AND MACRO-INFLUENCERS?', k: 'Reel', p: 'ig' },
      12: { t: 'COLOR PSYCHOLOGY – HOW BRANDS CHOOSE COLORS.', k: 'Reel', p: 'ig' },
      14: { t: 'THE DIFFERENCE BETWEEN MARKETING AND PR (AND WHY YOU NEED BOTH OF THEM)', k: 'Pozt', p: 'li' },
      16: { t: 'MOTIVATION VS DISCIPLINE', k: 'Reel', p: 'ig' },
      19: { t: '3 STEPS FROM AN IDEA TO A FINISHED POST', k: 'Reel', p: 'ig' },
      21: { t: 'HOW TO PLAN THE DAY EFFECTIVELY?', k: 'Post', p: 'li' },
      23: { t: 'HOW TO CHOOSE A RELEVANT INFLUENCER FOR A BRAND', k: 'Carousel post', p: 'ig' },
      26: { t: 'MIRO AND TRELLO. WHICH ONE IS BETTER FOR BRAINSTORMING IDEAS?', k: 'Carousel post', p: 'ig' },
      28: { t: 'WHY IS IT ESSENTIAL FOR A PERSON TO HAVE A PERSONAL BRAND ON LINKEDIN?', k: 'Post', p: 'li' },
      30: { t: 'WHAT HAS CHANGED IN INFLUENCER MARKETING IN RECENT YEARS?', k: 'Carousel post', p: 'ig' }
    }
  },
  {
    name: 'November', year: 2026, month: 10,
    entries: {
      4:  { t: 'HOW TO WRITE A CORRECT AND CLEAR BRIEF FOR AN INFLUENCER.', k: 'Post', p: 'li' },
      6:  { t: '"UGC" (USER-GENERATED CONTENT) – WHY PEOPLE TRUST REAL PEOPLE AND NOT ADVERTISING.', k: 'Carousel post', p: 'ig' },
      9:  { t: '5 PHONE APPS THAT WILL SAVE YOU TIME.', k: 'Reel', p: 'ig' },
      11: { t: 'WHY DO WE LOVE EFFECTIVE CASHBACKS AND LOYALTY PROGRAMS?', k: 'Post', p: 'li' },
      13: { t: 'NIKE "JUST DO IT" (1988) – HOW ONE SLOGAN CHANGED THE WORLD', k: 'Reel', p: 'ig' },
      16: { t: 'NOTION TEMPLATE FOR MONITORING CAMPAIGNS AND BUDGETS.', k: 'Carousel post', p: 'ig' },
      18: { t: 'BIRTHDAY WISHES FROM A ROBOT – WHY ARE WE STILL HAPPY TO GET THEM?', k: 'Post', p: 'li' },
      20: { t: 'WHAT A TYPICAL WORKDAY LOOKS LIKE FOR ME', k: 'Carousel post', p: 'ig' },
      23: { t: '3 DESIGN MISTAKES THAT MAKE A BRAND LOSE TRUST', k: 'Reel', p: 'ig' },
      25: { t: 'WHAT IS THE FLYWHEEL EFFECT AND HOW DOES IT HELP US GROW?', k: 'Post', p: 'li' },
      27: { t: '3 SIMPLE HABITS THAT WILL MAKE YOUR MORNING MORE PRODUCTIVE.', k: 'Reel', p: 'ig' },
      30: { t: '3 STEPS TO WRITE AN EFFECTIVE BRIEF', k: 'Reel', p: 'ig' }
    }
  },
  {
    name: 'December', year: 2026, month: 11,
    entries: {
      2:  { t: 'THE BEST CAREER DECISION I MADE THIS YEAR', k: 'Post', p: 'li' },
      4:  { t: 'THE BEST "NO" I SAID THIS YEAR', k: 'Reel', p: 'ig' },
      7:  { t: '3 PR SECRETS BIG BRANDS USE DURING THE HOLIDAYS', k: 'Reel', p: 'ig' },
      9:  { t: '3 MARKETING TRENDS THAT DOMINATED 2026', k: 'Post', p: 'li' },
      11: { t: 'MY BEST DISCOVERIES OF 2026', k: 'Carousel post', p: 'ig' },
      14: { t: 'TOOLS THAT SAVED MY SANITY IN 2026', k: 'Carousel post', p: 'ig' },
      16: { t: 'HOW TO PREP FOR THE END-OF-YEAR SLOWDOWN', k: 'Post', p: 'li' },
      18: { t: '3 PR/MARKETING CAMPAIGNS FROM 2026 THAT LIVED IN MY HEAD RENT-FREE', k: 'Reel', p: 'ig' },
      21: { t: 'ADVICE I WISH I KNEW IN BEFORE', k: 'Reel', p: 'ig' },
      23: { t: '3 PROFESSIONAL LESSONS 2026 TAUGHT ME', k: 'Post', p: 'li' },
      25: { t: 'POV: YOU SURVIVED 2026', k: 'Reel', p: 'ig' },
      28: { t: 'WHY IS MOTIVATION NOT ENOUGH?', k: 'Carousel post', p: 'ig' },
      30: { t: "WHY EVERYTHING DOESN'T MAGICALLY CHANGE ON JANUARY 1ST", k: 'Post', p: 'li' }
    }
  }
];

(function(){
  var DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  var root = document.getElementById('boards');

  CAL.forEach(function(mo, mi){
    var first = new Date(mo.year, mo.month, 1).getDay();          // weekday of the 1st
    var dim   = new Date(mo.year, mo.month + 1, 0).getDate();     // days in month
    var rows  = Math.ceil((first + dim) / 7);

    var board = document.createElement('section');
    board.className = 'board m m-float';
    board.style.setProperty('--d', (mi * .08) + 's');

    /* left column */
    var side = document.createElement('div');
    side.className = 'side';
    side.innerHTML =
      '<h2>Monthly Content Calendar<span class="sr"> — ' + mo.name + ' ' + mo.year + '</span></h2>' +
      '<div class="month">' + mo.name + '</div>' +
      '<span class="year-pill">' + mo.year + '</span>' +
      '<div class="legend"><p class="t">Platform</p>' +
      '<div class="legend-pills"><span class="ig">Instagram</span><span class="li">LinkedIn</span></div></div>';
    board.appendChild(side);

    /* calendar */
    var scroll = document.createElement('div');
    scroll.className = 'cal-scroll';
    scroll.setAttribute('tabindex','0');
    scroll.setAttribute('role','region');
    scroll.setAttribute('aria-label', mo.name + ' ' + mo.year + ' calendar');
    var cal = document.createElement('div');
    cal.className = 'cal';

    var head = document.createElement('div');
    head.className = 'cal-head';
    DAYS.forEach(function(d){ var c = document.createElement('div'); c.textContent = d; head.appendChild(c); });
    cal.appendChild(head);

    var grid = document.createElement('div');
    grid.className = 'cal-grid';
    var total = rows * 7;
    for (var i = 0; i < total; i++){
      var day = i - first + 1;
      var cell = document.createElement('div');
      if (day < 1 || day > dim){
        cell.className = 'cell empty';
      } else {
        var e = mo.entries[day];
        cell.className = 'cell' + (e ? ' has' : '');
        var html = '<span class="d">' + day + '</span>';
        if (e){
          var pName = e.p === 'ig' ? 'Instagram' : 'LinkedIn';
          html += '<span class="post-t" lang="ka">' + e.t + '</span>' +
                  '<span class="post-k" lang="ka">' + e.k + '</span>' +
                  '<span class="bar ' + e.p + '"><span class="sr">' + pName + '</span></span>';
        }
        cell.innerHTML = html;
      }
      grid.appendChild(cell);
    }
    cal.appendChild(grid);
    scroll.appendChild(cal);
    board.appendChild(scroll);
    root.appendChild(board);
  });

  /* entrance reveal */
  var io = new IntersectionObserver(function(es){
    es.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } });
  }, {threshold:.06});
  document.querySelectorAll('.m').forEach(function(el){ io.observe(el); });

  /* mobile nav */
  var burger = document.getElementById('burger'), menu = document.getElementById('navmobile');
  burger.setAttribute('aria-controls','navmobile');
  function closeMenu(){ menu.classList.remove('open'); burger.setAttribute('aria-expanded','false'); }
  burger.addEventListener('click', function(){
    var open = menu.classList.toggle('open'); burger.setAttribute('aria-expanded', open);
  });
  menu.addEventListener('click', function(e){ if(e.target.closest('a')) closeMenu(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeMenu(); });

  /* nav scrolled state (parity with homepage) */
  var nav = document.querySelector('header.nav');
  var onScroll = function(){ nav.classList.toggle('scrolled', window.scrollY>20); };
  onScroll(); window.addEventListener('scroll', onScroll, {passive:true});

  /* Aurora-style custom cursor (desktop fine-pointer only) */
  if(window.matchMedia('(pointer:fine)').matches && !window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    var dot=document.createElement('div');
    dot.className='cursor-dot'; dot.setAttribute('aria-hidden','true');
    document.body.appendChild(dot);
    var cx=innerWidth/2, cy=innerHeight/2, tx=cx, ty=cy, shown=false, scale=1;
    document.addEventListener('mousemove',function(e){
      tx=e.clientX; ty=e.clientY;
      if(!shown){ cx=tx; cy=ty; dot.classList.add('on'); shown=true; }
    },{passive:true});
    document.addEventListener('mouseleave',function(){ dot.classList.remove('on'); shown=false; });
    document.addEventListener('mouseover',function(e){
      var hit=e.target.closest('a,button,[role=button],input,textarea,label');
      scale=hit?2:1; dot.classList.toggle('grow',!!hit);
    });
    (function loop(){
      cx+=(tx-cx)*.22; cy+=(ty-cy)*.22;
      dot.style.transform='translate('+(cx-6.5)+'px,'+(cy-6.5)+'px) scale('+scale+')';
      requestAnimationFrame(loop);
    })();
  }
})();
</script>
</body>
</html>
